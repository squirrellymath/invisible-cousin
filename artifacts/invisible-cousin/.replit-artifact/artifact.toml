kind = "web"
previewPath = "/"
title = "The Invisible Cousin"
version = "1.0.0"
id = "artifacts/invisible-cousin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23324

[services.development]
run = "pnpm --filter @workspace/invisible-cousin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/invisible-cousin", "run", "build" ]
publicDir = "artifacts/invisible-cousin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23324"
BASE_PATH = "/"
